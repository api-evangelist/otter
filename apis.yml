aid: otter
name: Otter
description: >-
  Otter (TryOtter) is a Restaurant Operating System used by hundreds of
  thousands of restaurants worldwide to aggregate delivery and online orders,
  consolidate menus, analyze sales, and control third-party delivery services
  from one place. For developers and integration partners, Otter publishes a
  Public API and developer guides describing the workflows and business rules
  for building integrations across account pairing, orders, menus, delivery,
  finance, reports, reviews, storefront, loyalty, and store management. The
  integration model is built around Public API endpoints plus webhooks and
  configuration, with onboarding typically beginning by registering an
  application, configuring webhooks, and onboarding stores. Specific
  authentication and base URL details are provided through an account
  representative and the OpenAPI reference.
