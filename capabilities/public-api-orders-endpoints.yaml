binds:
- keys:
    OTTER_API_TOKEN: OTTER_API_TOKEN
  namespace: env
capability:
  consumes:
  - authentication:
      token: '{{env.OTTER_API_TOKEN}}'
      type: bearer
    baseUri: https://{public-api-url}
    description: Otter Public API — Orders Endpoints business capability. Self-contained,
      no shared references.
    namespace: public-api-orders-endpoints
    resources:
    - name: v1-orders
      operations:
      - description: Create Order
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: POST
        name: createOrder
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: /v1/orders
    - name: v1-orders-orderid
      operations:
      - description: Update Order
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: PUT
        name: updateOrder
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: /v1/orders/{orderId}
    - name: v1-orders-orderid-status
      operations:
      - description: Update Order Status
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: POST
        name: updateOrderStatus
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: /v1/orders/{orderId}/status
    - name: v1-orders-orderid-payments
      operations:
      - description: Update Order Customer Payment
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: PUT
        name: updateOrderCustomerPayment
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: /v1/orders/{orderId}/payments
    - name: v1-orders-orderid-delivery
      operations:
      - description: Update Order Delivery Information
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: PUT
        name: updateOrderDeliveryInfo
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: /v1/orders/{orderId}/delivery
    - name: v1-orders-past-orders
      operations:
      - description: Upload Past Orders
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: POST
        name: uploadPastOrders
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: /v1/orders/past-orders
    type: http
  exposes:
  - description: REST adapter for Otter Public API — Orders Endpoints. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    namespace: public-api-orders-endpoints-rest
    port: 8080
    resources:
    - description: REST surface for Create Order.
      name: createorder
      operations:
      - call: public-api-orders-endpoints.createOrder
        description: Create Order
        method: POST
        name: createOrder
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/orders
    - description: REST surface for Update Order.
      name: updateorder
      operations:
      - call: public-api-orders-endpoints.updateOrder
        description: Update Order
        method: PUT
        name: updateOrder
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/orders/{orderId}
    - description: REST surface for Update Order Status.
      name: updateorderstatus
      operations:
      - call: public-api-orders-endpoints.updateOrderStatus
        description: Update Order Status
        method: POST
        name: updateOrderStatus
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/orders/{orderId}/status
    - description: REST surface for Update Order Customer Payment.
      name: updateordercustomerpayment
      operations:
      - call: public-api-orders-endpoints.updateOrderCustomerPayment
        description: Update Order Customer Payment
        method: PUT
        name: updateOrderCustomerPayment
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/orders/{orderId}/payments
    - description: REST surface for Update Order Delivery Information.
      name: updateorderdeliveryinfo
      operations:
      - call: public-api-orders-endpoints.updateOrderDeliveryInfo
        description: Update Order Delivery Information
        method: PUT
        name: updateOrderDeliveryInfo
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/orders/{orderId}/delivery
    - description: REST surface for Upload Past Orders.
      name: uploadpastorders
      operations:
      - call: public-api-orders-endpoints.uploadPastOrders
        description: Upload Past Orders
        method: POST
        name: uploadPastOrders
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/orders/past-orders
    type: rest
  - description: MCP adapter for Otter Public API — Orders Endpoints. One tool per
      consumed operation, routed inline through this capability's consumes block.
    namespace: public-api-orders-endpoints-mcp
    port: 9090
    tools:
    - call: public-api-orders-endpoints.createOrder
      description: Create Order
      hints:
        destructive: false
        idempotent: false
        readOnly: false
      name: create-order
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    - call: public-api-orders-endpoints.updateOrder
      description: Update Order
      hints:
        destructive: false
        idempotent: true
        readOnly: false
      name: update-order
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    - call: public-api-orders-endpoints.updateOrderStatus
      description: Update Order Status
      hints:
        destructive: false
        idempotent: false
        readOnly: true
      name: update-order-status
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    - call: public-api-orders-endpoints.updateOrderCustomerPayment
      description: Update Order Customer Payment
      hints:
        destructive: false
        idempotent: true
        readOnly: false
      name: update-order-customer-payment
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    - call: public-api-orders-endpoints.updateOrderDeliveryInfo
      description: Update Order Delivery Information
      hints:
        destructive: false
        idempotent: true
        readOnly: false
      name: update-order-delivery-information
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    - call: public-api-orders-endpoints.uploadPastOrders
      description: Upload Past Orders
      hints:
        destructive: false
        idempotent: false
        readOnly: false
      name: upload-past-orders
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    transport: http
    type: mcp
