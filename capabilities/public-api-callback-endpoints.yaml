binds:
- keys:
    OTTER_API_TOKEN: OTTER_API_TOKEN
  namespace: env
capability:
  consumes:
  - authentication:
      token: '{{env.OTTER_API_TOKEN}}'
      type: bearer
    baseUri: https://{public-api-url}
    description: Otter Public API — Callback Endpoints business capability. Self-contained,
      no shared references.
    namespace: public-api-callback-endpoints
    resources:
    - name: v1-callback-error
      operations:
      - description: Publish Callback Error
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: POST
        name: publishError
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: /v1/callback/error
    type: http
  exposes:
  - description: REST adapter for Otter Public API — Callback Endpoints. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    namespace: public-api-callback-endpoints-rest
    port: 8080
    resources:
    - description: REST surface for Publish Callback Error.
      name: publisherror
      operations:
      - call: public-api-callback-endpoints.publishError
        description: Publish Callback Error
        method: POST
        name: publishError
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/callback/error
    type: rest
  - description: MCP adapter for Otter Public API — Callback Endpoints. One tool per
      consumed operation, routed inline through this capability's consumes block.
    namespace: public-api-callback-endpoints-mcp
    port: 9090
    tools:
    - call: public-api-callback-endpoints.publishError
      description: Publish Callback Error
      hints:
        destructive: false
        idempotent: false
        readOnly: false
      name: publish-callback-error
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    transport: http
    type: mcp
info:
  created: '2026-06-03'
  description: 'Callback Endpoints surface of the Otter Public API. 1 operations.
    Lead operation: Publish Callback Error. Self-contained Naftiko capability covering
    one Otter business surface.'
  label: Otter Public API — Callback Endpoints
  modified: '2026-06-03'
  tags:
  - Otter
  - Public API
  - Callback
naftiko: 1.0.0-alpha2
