binds:
- keys:
    OTTER_API_TOKEN: OTTER_API_TOKEN
  namespace: env
capability:
  consumes:
  - authentication:
      token: '{{env.OTTER_API_TOKEN}}'
      type: bearer
    baseUri: https://{public-api-url}
    description: Otter Public API — Finance Endpoints business capability. Self-contained,
      no shared references.
    namespace: public-api-finance-endpoints
    resources:
    - name: finance-v1-financial-transactions
      operations:
      - description: Post Financial Transactions
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: POST
        name: postFinancialTransactions
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: /finance/v1/financial-transactions
    - name: finance-v1-financial-invoices
      operations:
      - description: Post a Financial Invoice
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: POST
        name: postFinancialInvoice
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: /finance/v1/financial-invoices
    type: http
  exposes:
  - description: REST adapter for Otter Public API — Finance Endpoints. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    namespace: public-api-finance-endpoints-rest
    port: 8080
    resources:
    - description: REST surface for Post Financial Transactions.
      name: postfinancialtransactions
      operations:
      - call: public-api-finance-endpoints.postFinancialTransactions
        description: Post Financial Transactions
        method: POST
        name: postFinancialTransactions
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/finance/v1/financial-transactions
    - description: REST surface for Post a Financial Invoice.
      name: postfinancialinvoice
      operations:
      - call: public-api-finance-endpoints.postFinancialInvoice
        description: Post a Financial Invoice
        method: POST
        name: postFinancialInvoice
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/finance/v1/financial-invoices
    type: rest
  - description: MCP adapter for Otter Public API — Finance Endpoints. One tool per
      consumed operation, routed inline through this capability's consumes block.
    namespace: public-api-finance-endpoints-mcp
    port: 9090
    tools:
    - call: public-api-finance-endpoints.postFinancialTransactions
      description: Post Financial Transactions
      hints:
        destructive: false
        idempotent: false
        readOnly: false
      name: post-financial-transactions
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    - call: public-api-finance-endpoints.postFinancialInvoice
      description: Post a Financial Invoice
      hints:
        destructive: false
        idempotent: false
        readOnly: false
      name: post-financial-invoice
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    transport: http
    type: mcp
info:
  created: '2026-06-03'
  description: 'Finance Endpoints surface of the Otter Public API. 2 operations. Lead
    operation: Post Financial Transactions. Self-contained Naftiko capability covering
    one Otter business surface.'
  label: Otter Public API — Finance Endpoints
  modified: '2026-06-03'
  tags:
  - Otter
  - Public API
  - Finance
naftiko: 1.0.0-alpha2
