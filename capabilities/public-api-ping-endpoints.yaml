binds:
- keys:
    OTTER_API_TOKEN: OTTER_API_TOKEN
  namespace: env
capability:
  consumes:
  - authentication:
      token: '{{env.OTTER_API_TOKEN}}'
      type: bearer
    baseUri: https://{public-api-url}
    description: Otter Public API — Ping Endpoints business capability. Self-contained,
      no shared references.
    namespace: public-api-ping-endpoints
    resources:
    - name: v1-ping
      operations:
      - description: Ping the System
        inputParameters:
        - description: X-Echo-Error parameter.
          in: header
          name: X-Echo-Error
          required: false
          type: string
        method: GET
        name: ping
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: /v1/ping
    type: http
  exposes:
  - description: REST adapter for Otter Public API — Ping Endpoints. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    namespace: public-api-ping-endpoints-rest
    port: 8080
    resources:
    - description: REST surface for Ping the System.
      name: ping
      operations:
      - call: public-api-ping-endpoints.ping
        description: Ping the System
        method: GET
        name: ping
        outputParameters:
        - mapping: $.
          type: object
        with:
          X-Echo-Error: rest.X-Echo-Error
      path: /v1/ping
    type: rest
  - description: MCP adapter for Otter Public API — Ping Endpoints. One tool per consumed
      operation, routed inline through this capability's consumes block.
    namespace: public-api-ping-endpoints-mcp
    port: 9090
    tools:
    - call: public-api-ping-endpoints.ping
      description: Ping the System
      hints:
        destructive: false
        idempotent: true
        readOnly: true
      name: ping-system
      outputParameters:
      - mapping: $.
        type: object
      with:
        X-Echo-Error: tools.X-Echo-Error
    transport: http
    type: mcp
info:
  created: '2026-06-03'
  description: 'Ping Endpoints surface of the Otter Public API. 1 operations. Lead
    operation: Ping the System. Self-contained Naftiko capability covering one Otter
    business surface.'
  label: Otter Public API — Ping Endpoints
  modified: '2026-06-03'
  tags:
  - Otter
  - Public API
  - Ping
naftiko: 1.0.0-alpha2
