binds:
- keys:
    OTTER_API_TOKEN: OTTER_API_TOKEN
  namespace: env
capability:
  consumes:
  - authentication:
      token: '{{env.OTTER_API_TOKEN}}'
      type: bearer
    baseUri: https://{public-api-url}
    description: Otter Public API — Storefront Webhooks business capability. Self-contained,
      no shared references.
    namespace: public-api-storefront-webhooks
    resources:
    - name: pausestore
      operations:
      - description: Pause Store Webhook
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: POST
        name: pauseStoreWebhook
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: pauseStore
    - name: unpausestore
      operations:
      - description: Unpause Store Webhook
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: POST
        name: unpauseStoreWebhook
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: unpauseStore
    - name: getstoreavailability
      operations:
      - description: Get Store Availability Webhook
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: POST
        name: getStoreAvailabilityWebhook
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: getStoreAvailability
    - name: getstorehoursconfiguration
      operations:
      - description: Get Store Hours Configuration Webhook
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: POST
        name: getStoreHoursConfigurationWebhook
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: getStoreHoursConfiguration
    type: http
  exposes:
  - description: REST adapter for Otter Public API — Storefront Webhooks. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    namespace: public-api-storefront-webhooks-rest
    port: 8080
    resources:
    - description: REST surface for Pause Store Webhook.
      name: pausestorewebhook
      operations:
      - call: public-api-storefront-webhooks.pauseStoreWebhook
        description: Pause Store Webhook
        method: POST
        name: pauseStoreWebhook
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/pausestore
    - description: REST surface for Unpause Store Webhook.
      name: unpausestorewebhook
      operations:
      - call: public-api-storefront-webhooks.unpauseStoreWebhook
        description: Unpause Store Webhook
        method: POST
        name: unpauseStoreWebhook
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/unpausestore
    - description: REST surface for Get Store Availability Webhook.
      name: getstoreavailabilitywebhook
      operations:
      - call: public-api-storefront-webhooks.getStoreAvailabilityWebhook
        description: Get Store Availability Webhook
        method: POST
        name: getStoreAvailabilityWebhook
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/getstoreavailability
    - description: REST surface for Get Store Hours Configuration Webhook.
      name: getstorehoursconfigurationwebhook
      operations:
      - call: public-api-storefront-webhooks.getStoreHoursConfigurationWebhook
        description: Get Store Hours Configuration Webhook
        method: POST
        name: getStoreHoursConfigurationWebhook
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/getstorehoursconfiguration
    type: rest
  - description: MCP adapter for Otter Public API — Storefront Webhooks. One tool
      per consumed operation, routed inline through this capability's consumes block.
    namespace: public-api-storefront-webhooks-mcp
    port: 9090
    tools:
    - call: public-api-storefront-webhooks.pauseStoreWebhook
      description: Pause Store Webhook
      hints:
        destructive: false
        idempotent: false
        readOnly: false
      name: pause-store-webhook
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    - call: public-api-storefront-webhooks.unpauseStoreWebhook
      description: Unpause Store Webhook
      hints:
        destructive: false
        idempotent: false
        readOnly: false
      name: unpause-store-webhook
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    - call: public-api-storefront-webhooks.getStoreAvailabilityWebhook
      description: Get Store Availability Webhook
      hints:
        destructive: false
        idempotent: false
        readOnly: true
      name: get-store-availability-webhook
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    - call: public-api-storefront-webhooks.getStoreHoursConfigurationWebhook
      description: Get Store Hours Configuration Webhook
      hints:
        destructive: false
        idempotent: false
        readOnly: true
      name: get-store-hours-configuration-webhook
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    transport: http
    type: mcp
