          body: rest.body
      path: /v1/menus/menu-sync
    - description: REST surface for Suspend Menu Entities Targets for a Store.
      name: managersuspendmenuentities
      operations:
      - call: public-api-manager-menu-endpoints.managerSuspendMenuEntities
        description: Suspend Menu Entities Targets for a Store
