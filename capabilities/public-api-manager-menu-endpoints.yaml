      path: /manager/menu/v1/menus/publish-targets
    - name: manager-menu-v1-menus-publish
      operations:
      - description: Publish Menus to Targets for a Store
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: POST
        name: managerPublishMenu
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: /manager/menu/v1/menus/publish
    - name: manager-menu-v1-menus-menu-sync
      operations:
      - description: Synchronize Store Menu with POS Menu
        inputParameters:
        - description: Request body payload.
