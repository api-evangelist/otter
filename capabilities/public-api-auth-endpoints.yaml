binds:
- keys:
    OTTER_API_TOKEN: OTTER_API_TOKEN
  namespace: env
capability:
  consumes:
  - authentication:
      token: '{{env.OTTER_API_TOKEN}}'
      type: bearer
    baseUri: https://{public-api-url}
    description: Otter Public API — Auth Endpoints business capability. Self-contained,
      no shared references.
    namespace: public-api-auth-endpoints
    resources:
    - name: v1-auth-token
      operations:
      - description: Generate Token
        inputParameters:
        - description: Request body payload.
          in: body
          name: body
          required: true
          type: object
        method: POST
        name: requestToken
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: /v1/auth/token
    - name: v1-auth-oauth2-authorize
      operations:
      - description: OAuth 2.0 Authorize Endpoint
        inputParameters:
        - description: The ID of the client (also known as the Application ID).
          in: query
          name: client_id
          required: true
          type: string
        - description: The URI to where the user should be redirected when the flow
            is successfully completed. It must be previously registered at Developer
            Portal in the application settings.
          in: query
          name: redirect_uri
          required: true
          type: string
        - description: Specifies the expected response type. Only "code" is accepted.
          in: query
          name: response_type
          required: true
          type: string
        - description: The scope to request, multiple scopes are passed delimited
            by a space character.
          in: query
          name: scope
          required: true
          type: string
        - description: Can be used to store request-specific data. The server will
            return the unmodified state value back to the application.
          in: query
          name: state
          required: true
          type: string
        - description: A code verifier generated by the client application transformed
            by applying a cryptographic hash function, such as SHA-256, and encoding
            the result using URL-safe Base64 encoding.
          in: query
          name: code_challenge
          required: false
          type: string
        - description: Method used to transform the code verifier. The most common
            method is "S256", which stands for SHA-256.
          in: query
          name: code_challenge_method
          required: false
          type: string
        method: GET
        name: oauth2Authorize
        outputParameters:
        - name: result
          type: object
          value: $.
        outputRawFormat: json
      path: /v1/auth/oauth2/authorize
    type: http
  exposes:
  - description: REST adapter for Otter Public API — Auth Endpoints. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    namespace: public-api-auth-endpoints-rest
    port: 8080
    resources:
    - description: REST surface for Generate Token.
      name: requesttoken
      operations:
      - call: public-api-auth-endpoints.requestToken
        description: Generate Token
        method: POST
        name: requestToken
        outputParameters:
        - mapping: $.
          type: object
        with:
          body: rest.body
      path: /v1/auth/token
    - description: REST surface for OAuth 2.0 Authorize Endpoint.
      name: oauth2authorize
      operations:
      - call: public-api-auth-endpoints.oauth2Authorize
        description: OAuth 2.0 Authorize Endpoint
        method: GET
        name: oauth2Authorize
        outputParameters:
        - mapping: $.
          type: object
        with:
          client_id: rest.client_id
          code_challenge: rest.code_challenge
          code_challenge_method: rest.code_challenge_method
          redirect_uri: rest.redirect_uri
          response_type: rest.response_type
          scope: rest.scope
          state: rest.state
      path: /v1/auth/oauth2/authorize
    type: rest
  - description: MCP adapter for Otter Public API — Auth Endpoints. One tool per consumed
      operation, routed inline through this capability's consumes block.
    namespace: public-api-auth-endpoints-mcp
    port: 9090
    tools:
    - call: public-api-auth-endpoints.requestToken
      description: Generate Token
      hints:
        destructive: false
        idempotent: false
        readOnly: false
      name: generate-token
      outputParameters:
      - mapping: $.
        type: object
      with:
        body: tools.body
    - call: public-api-auth-endpoints.oauth2Authorize
      description: OAuth 2.0 Authorize Endpoint
      hints:
        destructive: false
        idempotent: true
        readOnly: true
      name: oauth-2-0-authorize-endpoint
      outputParameters:
      - mapping: $.
        type: object
      with:
        client_id: tools.client_id
        code_challenge: tools.code_challenge
        code_challenge_method: tools.code_challenge_method
        redirect_uri: tools.redirect_uri
        response_type: tools.response_type
        scope: tools.scope
        state: tools.state
    transport: http
    type: mcp
info:
  created: '2026-06-03'
  description: 'Auth Endpoints surface of the Otter Public API. 2 operations. Lead
    operation: Generate Token. Self-contained Naftiko capability covering one Otter
    business surface.'
  label: Otter Public API — Auth Endpoints
  modified: '2026-06-03'
  tags:
  - Otter
  - Public API
  - Auth
naftiko: 1.0.0-alpha2
